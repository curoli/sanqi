name: Release Rust Crates

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: Publish sanqi-core, sanqi-engine, sanqi-render
    runs-on: ubuntu-latest
    environment:
      name: crates-io
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Verify release tag matches workspace version
        run: |
          expected_version="$(grep -E '^version = ' Cargo.toml | head -n1 | cut -d'"' -f2)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$expected_version" ]; then
            echo "tag version $tag_version does not match workspace version $expected_version"
            exit 1
          fi

      - name: Run tests
        run: cargo test --all-targets

      - name: Publish sanqi-core
        run: cargo publish -p sanqi-core --locked

      - name: Publish sanqi-engine
        run: |
          for attempt in 1 2 3 4 5 6; do
            cargo publish -p sanqi-engine --locked && exit 0
            echo "sanqi-engine publish attempt ${attempt} failed; waiting for index propagation"
            sleep 20
          done
          exit 1

      - name: Publish sanqi-render
        run: |
          for attempt in 1 2 3 4 5 6; do
            cargo publish -p sanqi-render --locked && exit 0
            echo "sanqi-render publish attempt ${attempt} failed; waiting for index propagation"
            sleep 20
          done
          exit 1
